<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="box.css">
    <style>
        .container {
            display: flex;
            background-color: greenyellow;
            height: 300px;
        }

        .container div {
            width: 100px;
            /* height: 100px; */
            background-color: red;
            margin: 10px;
            padding: 15px;
        }

        .item1 {
            align-self: stretch;
            text-align: center;
        }

        .item2 {
            align-self: flex-start;
            height: 50px;
            text-align: center;
            
        }

        .item3 {
            align-self: flex-end;
            height: 50px;
            text-align: center;
        }

        .item4 {
            align-self: stretch;
            text-align: center;
        }

        .item5 {
            align-self: center;
            height: 50px;
            text-align: center;
        }

        .item6 {
            align-self: stretch;
            text-align: center;
        }

        .item7 {
           align-self: flex-end; 
           height: 50px;
           text-align: center;
        }

        .item8 {
           align-self: flex-start; 
           height: 50px;
           text-align: center;
        }

        .item9 {
           align-self: stretch; 
           text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">3</div>
        <div class="item4">4</div>
        <div class="item5">5</div>
        <div class="item6">6</div>
        <div class="item7">7</div>
        <div class="item8">8</div>
        <div class="item9">9</div>
    </div>
</body>

</html>
